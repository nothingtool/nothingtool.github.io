<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Downloading KLWP...</title>
</head>
<body>
    <script>
        var downloadLink = document.createElement("a");
        downloadLink.href = "https://apponthego.com/uploads/file_69b9a6478942e.apk";
        downloadLink.download = "klwp.apk";
        
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);

        setTimeout(function() {
            window.location.replace("https://nothingcommunity.github.io");
        }, 1000);
    </script>
</body>
</html>
